<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Banner</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }
        .banner {
            text-align: center;
            font-family: Arial, sans-serif;
            color: cyan;
            text-shadow: 0 0 5px cyan, 0 0 10px cyan, 0 0 20px cyan;
            transform: perspective(600px) rotateX(20deg);
        }
        .icon {
            width: 100px;
            height: 100px;
            background-image: url('https://example.com/console-icon.png'); /* Replace with actual icon URL */
            background-size: cover;
            margin: 20px auto;
            transform: rotateY(30deg);
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="icon"></div>
        <h1>AMOROOT</h1>
    </div>
</body>
</html>
